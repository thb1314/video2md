services:
  video2md:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: "asr"
        UV_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
      extra_hosts:
        - "host.docker.internal:host-gateway"
    image: video2md:gpu
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY:-}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./input:/data/input
      - ./output:/data/output
    command:
      [
        "run",
        "--input",
        "/data/input",
        "--output",
        "/data/output",
        "--mode",
        "continuous",
        "--asr-backend",
        "faster-whisper",
        "--asr-device",
        "cuda",
        "--asr-compute-type",
        "float16",
        "--ocr-backend",
        "none"
      ]

  video2md-cpu:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: ""
        UV_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
      extra_hosts:
        - "host.docker.internal:host-gateway"
    image: video2md:cpu
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY:-}"
    volumes:
      - ./input:/data/input
      - ./output:/data/output
    command:
      [
        "run",
        "--input",
        "/data/input",
        "--output",
        "/data/output",
        "--mode",
        "continuous",
        "--asr-backend",
        "none",
        "--ocr-backend",
        "none"
      ]

  video2md-qwen:
    profiles: ["vlm"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: "asr ocr"
        INSTALL_ONNXRUNTIME_GPU: "1"
        UV_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
      extra_hosts:
        - "host.docker.internal:host-gateway"
    image: video2md:gpu-vlm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY:-}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./input:/data/input
      - ./output:/data/output
    command:
      [
        "run",
        "--input",
        "/data/input",
        "--output",
        "/data/output",
        "--mode",
        "continuous",
        "--asr-backend",
        "faster-whisper",
        "--asr-device",
        "cuda",
        "--asr-compute-type",
        "float16",
        "--ocr-backend",
        "rapidocr",
        "--rapidocr-use-cuda",
        "--mining-passes",
        "2",
        "--vlm-backend",
        "siliconflow",
        "--vlm-model",
        "Qwen/Qwen3-VL-32B-Instruct",
        "--siliconflow-api-url",
        "https://api.siliconflow.cn/v1/chat/completions",
        "--lecture-refine-with-vlm",
        "--lecture-strong-normalize-with-vlm"
      ]

  video2md-qwen-cpuocr:
    profiles: ["vlm-cpuocr"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: "asr ocr"
        INSTALL_ONNXRUNTIME_GPU: "0"
        UV_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
      extra_hosts:
        - "host.docker.internal:host-gateway"
    image: video2md:gpu-vlm-cpuocr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY:-}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./input:/data/input
      - ./output:/data/output
    command:
      [
        "run",
        "--input",
        "/data/input",
        "--output",
        "/data/output",
        "--mode",
        "continuous",
        "--asr-backend",
        "faster-whisper",
        "--asr-device",
        "cuda",
        "--asr-compute-type",
        "float16",
        "--ocr-backend",
        "rapidocr",
        "--mining-passes",
        "2",
        "--vlm-backend",
        "siliconflow",
        "--vlm-model",
        "Qwen/Qwen3-VL-32B-Instruct",
        "--siliconflow-api-url",
        "https://api.siliconflow.cn/v1/chat/completions"
      ]
